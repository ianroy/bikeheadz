<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 920" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#16a34a"/>
    </marker>
    <linearGradient id="bgRunpod" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#faf5ff"/>
      <stop offset="100%" stop-color="#f3e8ff"/>
    </linearGradient>
    <linearGradient id="bgDO" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="bgClient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
  </defs>

  <text x="640" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">StemDomeZ — System architecture (v0.1.34)</text>
  <text x="640" y="58" text-anchor="middle" font-size="13" fill="#475569">photo → TRELLIS → 7-stage CAD pipeline → chunked-yield delivery → Three.js viewer → Stripe Checkout → STL download</text>

  <rect x="40" y="90" width="380" height="240" rx="14" fill="url(#bgClient)" stroke="#16a34a" stroke-width="2"/>
  <text x="60" y="115" font-size="14" font-weight="700" fill="#15803d">Browser (client)</text>

  <rect x="60" y="130" width="160" height="60" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="140" y="152" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">Vanilla JS UI</text>
  <text x="140" y="170" text-anchor="middle" font-size="11" fill="#475569">Tailwind v4 · router</text>
  <text x="140" y="184" text-anchor="middle" font-size="11" fill="#475569">command pattern</text>

  <rect x="240" y="130" width="160" height="60" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="320" y="152" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">Three.js viewer</text>
  <text x="320" y="170" text-anchor="middle" font-size="11" fill="#475569">STLLoader</text>
  <text x="320" y="184" text-anchor="middle" font-size="11" fill="#475569">OrbitControls</text>

  <rect x="60" y="200" width="340" height="56" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="230" y="222" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">socket.io client — single "command" event</text>
  <text x="230" y="240" text-anchor="middle" font-size="11" fill="#475569">{ id, name, payload } · request/response correlated by id</text>

  <rect x="60" y="266" width="340" height="50" rx="8" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="230" y="287" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">Stripe Checkout (hosted redirect)</text>
  <text x="230" y="304" text-anchor="middle" font-size="11" fill="#475569">verified server-side on redirect-return — no webhook</text>

  <rect x="460" y="90" width="380" height="540" rx="14" fill="url(#bgDO)" stroke="#2563eb" stroke-width="2"/>
  <text x="480" y="115" font-size="14" font-weight="700" fill="#1d4ed8">DigitalOcean App Platform</text>
  <text x="480" y="131" font-size="11" fill="#475569">Node 22 · Express · socket.io</text>

  <rect x="480" y="148" width="340" height="92" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="650" y="170" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">server/index.js</text>
  <text x="650" y="188" text-anchor="middle" font-size="11" fill="#475569">Express + socket.io · GET /health · graceful SIGTERM</text>
  <text x="650" y="206" text-anchor="middle" font-size="11" fill="#475569">command dispatcher</text>
  <text x="650" y="224" text-anchor="middle" font-size="11" fill="#475569">stl · payments · designs · orders · account</text>

  <rect x="480" y="252" width="340" height="92" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="650" y="274" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">workers/runpod-client.js</text>
  <text x="650" y="292" text-anchor="middle" font-size="11" fill="#475569">POST /run · GET /stream/&lt;id&gt; (1.5s polling, 12 min cap)</text>
  <text x="650" y="308" text-anchor="middle" font-size="11" fill="#475569">indexes result_chunk frames; reassembles base64</text>
  <text x="650" y="326" text-anchor="middle" font-size="11" fill="#475569">/status fallback for dropped streams</text>

  <rect x="480" y="356" width="340" height="64" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="650" y="378" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">design-store.js</text>
  <text x="650" y="396" text-anchor="middle" font-size="11" fill="#475569">stl_bytes BYTEA in Postgres · 24h TTL · in-memory fallback</text>
  <text x="650" y="412" text-anchor="middle" font-size="11" fill="#475569">prune job runs every 15 min</text>

  <rect x="480" y="432" width="340" height="64" rx="8" fill="#ffffff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="650" y="454" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">stripe-client.js</text>
  <text x="650" y="472" text-anchor="middle" font-size="11" fill="#475569">SDK factory · pricing catalogue</text>
  <text x="650" y="488" text-anchor="middle" font-size="11" fill="#475569">payments.createCheckoutSession / verifySession</text>

  <rect x="480" y="508" width="340" height="92" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="650" y="530" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">Managed Postgres 18</text>
  <text x="650" y="548" text-anchor="middle" font-size="11" fill="#475569">accounts · designs · generated_designs · purchases</text>
  <text x="650" y="566" text-anchor="middle" font-size="11" fill="#475569">migrations applied PRE_DEPLOY</text>
  <text x="650" y="584" text-anchor="middle" font-size="11" fill="#475569">encrypted-but-unverified TLS</text>

  <rect x="880" y="90" width="360" height="700" rx="14" fill="url(#bgRunpod)" stroke="#7c3aed" stroke-width="2"/>
  <text x="900" y="115" font-size="14" font-weight="700" fill="#6b21a8">RunPod Serverless GPU</text>
  <text x="900" y="131" font-size="11" fill="#475569">image: ghcr.io/&lt;owner&gt;/&lt;repo&gt;:v0.1.34</text>

  <rect x="900" y="148" width="320" height="120" rx="8" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="1060" y="170" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">handler.py (generator)</text>
  <text x="1060" y="190" text-anchor="middle" font-size="11" fill="#475569">[stemdomez] handler.py v0.1.34 booting</text>
  <text x="1060" y="207" text-anchor="middle" font-size="11" fill="#475569">module-load probes · failure corpus</text>
  <text x="1060" y="225" text-anchor="middle" font-size="11" fill="#475569">return_aggregate_stream=False ✓</text>
  <text x="1060" y="243" text-anchor="middle" font-size="11" fill="#475569">yields: progress · result_chunk × N · result</text>
  <text x="1060" y="261" text-anchor="middle" font-size="11" fill="#475569">CHUNK_SIZE = 700 KB</text>

  <rect x="900" y="280" width="320" height="76" rx="8" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="1060" y="300" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">TRELLIS-image-large</text>
  <text x="1060" y="318" text-anchor="middle" font-size="11" fill="#475569">~30s warm · ~5–10 min cold</text>
  <text x="1060" y="334" text-anchor="middle" font-size="11" fill="#475569">~780k-tri head mesh, often non-manifold</text>
  <text x="1060" y="350" text-anchor="middle" font-size="11" fill="#475569">cached on /runpod-volume/cache/trellis/</text>

  <rect x="900" y="368" width="320" height="232" rx="8" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="1060" y="390" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">v1 mesh pipeline (pipeline/stages.py)</text>
  <line x1="916" y1="400" x2="1204" y2="400" stroke="#e9d5ff"/>
  <text x="916" y="418" font-size="11" fill="#0f172a"><tspan font-weight="600">stage 1</tspan> · normalize: orient Z-up, rescale to 30 mm</text>
  <text x="916" y="436" font-size="11" fill="#0f172a"><tspan font-weight="600">stage 1.5</tspan> · repair: pymeshlab close holes (warns)</text>
  <text x="916" y="454" font-size="11" fill="#0f172a"><tspan font-weight="600">stage 2</tspan> · crop to neck (boolean cut, CDT triangulate)</text>
  <text x="916" y="472" font-size="11" fill="#0f172a"><tspan font-weight="600">stage 3</tspan> · subtract negative_core.stl (carve cavity)</text>
  <text x="916" y="490" font-size="11" fill="#0f172a"><tspan font-weight="600">stage 4</tspan> · union valve_cap.stl (fall back to concat)</text>
  <text x="916" y="508" font-size="11" fill="#0f172a"><tspan font-weight="600">stage 5</tspan> · simplify 50–80k tris · Taubin smooth · STL</text>
  <line x1="916" y1="518" x2="1204" y2="518" stroke="#e9d5ff"/>
  <text x="1060" y="538" text-anchor="middle" font-size="11" fill="#475569">user sliders: Crop Tightness · Head Pitch</text>
  <text x="1060" y="556" text-anchor="middle" font-size="11" fill="#475569">Head Height · Cap Protrusion</text>
  <text x="1060" y="576" text-anchor="middle" font-size="11" fill="#475569">manifold3d 3.4 · trimesh 4.x · pymeshlab</text>
  <text x="1060" y="592" text-anchor="middle" font-size="11" fill="#475569">fast-simplification</text>

  <rect x="900" y="612" width="320" height="92" rx="10" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="1060" y="634" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">/runpod-volume (Network Volume)</text>
  <text x="1060" y="652" text-anchor="middle" font-size="11" fill="#475569">hf/ — TRELLIS + dinov2 + u2net weights</text>
  <text x="1060" y="668" text-anchor="middle" font-size="11" fill="#475569">torch/ — torch.hub cache</text>
  <text x="1060" y="684" text-anchor="middle" font-size="11" fill="#475569">cache/trellis/ — slider-tweak fast path</text>
  <text x="1060" y="700" text-anchor="middle" font-size="11" fill="#475569">failures/&lt;date&gt;/&lt;jobId&gt;/ — corpus</text>

  <rect x="900" y="716" width="320" height="64" rx="8" fill="#ffffff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="1060" y="738" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">assets baked into image</text>
  <text x="1060" y="755" text-anchor="middle" font-size="11" fill="#475569">/app/valve_cap.stl · /app/negative_core.stl</text>
  <text x="1060" y="772" text-anchor="middle" font-size="11" fill="#475569">/app/pipeline/pipeline_constants.json</text>

  <rect x="40" y="660" width="800" height="130" rx="14" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="60" y="685" font-size="14" font-weight="700" fill="#854d0e">Build &amp; release pipeline</text>

  <rect x="60" y="700" width="190" height="74" rx="8" fill="#ffffff" stroke="#fde68a" stroke-width="1.5"/>
  <text x="155" y="722" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">git push + gh release</text>
  <text x="155" y="740" text-anchor="middle" font-size="11" fill="#475569">vX.Y.Z tag triggers GHA</text>
  <text x="155" y="756" text-anchor="middle" font-size="11" fill="#475569">bump HANDLER_VERSION</text>
  <text x="155" y="770" text-anchor="middle" font-size="11" fill="#475569">in same commit</text>

  <rect x="270" y="700" width="180" height="74" rx="8" fill="#ffffff" stroke="#fde68a" stroke-width="1.5"/>
  <text x="360" y="722" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">GitHub Actions</text>
  <text x="360" y="740" text-anchor="middle" font-size="11" fill="#475569">build-runpod-image.yml</text>
  <text x="360" y="756" text-anchor="middle" font-size="11" fill="#475569">~17–25 min cold</text>
  <text x="360" y="770" text-anchor="middle" font-size="11" fill="#475569">cache-from: type=gha</text>

  <rect x="470" y="700" width="170" height="74" rx="8" fill="#ffffff" stroke="#fde68a" stroke-width="1.5"/>
  <text x="555" y="722" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">GHCR registry</text>
  <text x="555" y="740" text-anchor="middle" font-size="11" fill="#475569">ghcr.io/&lt;owner&gt;/&lt;repo&gt;</text>
  <text x="555" y="756" text-anchor="middle" font-size="11" fill="#475569">:vX.Y.Z + :latest</text>
  <text x="555" y="770" text-anchor="middle" font-size="11" fill="#475569">multi-GB image</text>

  <rect x="660" y="700" width="170" height="74" rx="8" fill="#ffffff" stroke="#fde68a" stroke-width="1.5"/>
  <text x="745" y="722" text-anchor="middle" font-size="12" font-weight="600" fill="#0f172a">RunPod release</text>
  <text x="745" y="740" text-anchor="middle" font-size="11" fill="#475569">Manage → New Release</text>
  <text x="745" y="756" text-anchor="middle" font-size="11" fill="#475569">paste GHCR URL</text>
  <text x="745" y="770" text-anchor="middle" font-size="11" fill="#475569">verify boot banner</text>

  <rect x="40" y="350" width="380" height="80" rx="14" fill="#ffffff" stroke="#94a3b8" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="230" y="375" text-anchor="middle" font-size="14" font-weight="700" fill="#0f172a">Stripe (external)</text>
  <text x="230" y="395" text-anchor="middle" font-size="11" fill="#475569">hosted Checkout · server-side verify on return</text>
  <text x="230" y="412" text-anchor="middle" font-size="11" fill="#475569">no webhook · no inline elements</text>

  <path d="M400,235 L460,235" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <text x="430" y="228" text-anchor="middle" font-size="10" fill="#16a34a" font-weight="600">socket.io</text>

  <path d="M460,290 L400,290" stroke="#16a34a" stroke-width="2" fill="none" marker-end="url(#arrow-green)"/>
  <text x="430" y="305" text-anchor="middle" font-size="10" fill="#16a34a" font-weight="600">progress · result</text>

  <path d="M820,300 L900,200" stroke="#7c3aed" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>
  <text x="877" y="245" text-anchor="middle" font-size="10" fill="#7c3aed" font-weight="600">POST /run</text>

  <path d="M900,250 L820,330" stroke="#7c3aed" stroke-width="2" fill="none" marker-end="url(#arrow-purple)"/>
  <text x="845" y="312" text-anchor="middle" font-size="10" fill="#7c3aed" font-weight="600">/stream/&lt;id&gt;</text>

  <path d="M650,420 L650,500" stroke="#2563eb" stroke-width="2" fill="none" marker-end="url(#arrow-blue)"/>

  <path d="M230,316 L230,348" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <path d="M460,470 L320,420" stroke="#94a3b8" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <path d="M250,737 L270,737" stroke="#ca8a04" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M450,737 L470,737" stroke="#ca8a04" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M640,737 L660,737" stroke="#ca8a04" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M830,737 L880,737 L880,200 L900,200" stroke="#ca8a04" stroke-width="2" fill="none" marker-end="url(#arrow)" stroke-dasharray="4 3"/>

  <text x="40" y="836" font-size="13" font-weight="700" fill="#0f172a">Key data flows</text>
  <line x1="40" y1="850" x2="80" y2="850" stroke="#16a34a" stroke-width="2"/>
  <text x="88" y="854" font-size="11" fill="#475569">socket.io (command pattern, no REST)</text>

  <line x1="290" y1="850" x2="330" y2="850" stroke="#7c3aed" stroke-width="2"/>
  <text x="338" y="854" font-size="11" fill="#475569">RunPod HTTP poll (chunked-yield protocol)</text>

  <line x1="610" y1="850" x2="650" y2="850" stroke="#2563eb" stroke-width="2"/>
  <text x="658" y="854" font-size="11" fill="#475569">Postgres TLS (BYTEA STL · 24h TTL)</text>

  <line x1="900" y1="850" x2="940" y2="850" stroke="#ca8a04" stroke-width="2"/>
  <text x="948" y="854" font-size="11" fill="#475569">Build/release path (image lifecycle)</text>

  <text x="40" y="884" font-size="11" fill="#64748b" font-style="italic">See README.md, ProductSpec.md, 3D_Pipeline.md, docs/RUNPOD_TRELLIS_PLAYBOOK.md for the prose.</text>
