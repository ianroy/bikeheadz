name: Build RunPod image

# Builds the TRELLIS serverless image and pushes it to the GitHub
# Container Registry. Fires on:
#   • Any published release (so `gh release create vX.Y.Z` kicks a build)
#   • Manual dispatch from the Actions tab (for ad-hoc rebuilds)
#
# The resulting image is available as:
#   ghcr.io/<owner>/<repo>:<tag>
#   ghcr.io/<owner>/<repo>:latest
#
# Paste that URL into RunPod → Serverless → New Endpoint → Container Image.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. 'latest' or 'dev')"
        default: "latest"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Compute tags
        id: tags
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "list=${{ steps.image.outputs.name }}:${{ github.event.release.tag_name }},${{ steps.image.outputs.name }}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "list=${{ steps.image.outputs.name }}:${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.list }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print pull URL
        run: |
          echo "::notice title=Image published::Paste this into RunPod: ${{ steps.image.outputs.name }}:latest"
