name: a11y

# P6-009 — axe-core CI. Runs on every PR. Fails on any critical or
# serious WCAG violation surfaced by @axe-core/cli.
#
# Escape hatch
# ------------
# If a specific violation is intentional and tracked, add an HTML comment
# of the form `<!-- axe-skip:<rule-id>:<reason> -->` immediately above the
# offending element and open an issue. The comment is purely a paper
# trail for reviewers; it does NOT silence axe (axe runs against the
# rendered DOM and ignores comments). When you need to actually
# suppress a finding, configure axe via a runner config in this workflow
# rather than annotating templates — drift between markup-level comments
# and runner config is a known maintenance trap.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  axe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build client
        run: npm run build

      - name: Start server
        env:
          PORT: 5173
          NODE_ENV: production
        run: |
          npm start &
          echo "$!" > server.pid
          # Wait for /health to come up (no REST policy explicitly carves
          # out GET /health, so this is the canonical readiness probe).
          for i in $(seq 1 60); do
            if curl -sSf "http://localhost:5173/health" > /dev/null; then
              echo "server up after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Run axe-core
        run: |
          npx --yes @axe-core/cli \
            http://localhost:5173/ \
            http://localhost:5173/pricing \
            http://localhost:5173/how-it-works \
            http://localhost:5173/help \
            --tags wcag2a,wcag2aa \
            --exit

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" 2>/dev/null || true
          fi
