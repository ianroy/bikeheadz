<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, 'Helvetica Neue', sans-serif">
  <!--
    StemDomeZ — User journey (non-technical).
    For VC pitch + onboarding · what a rider sees end-to-end.
  -->

  <defs>
    <pattern id="dots-bg" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#0E0A12" opacity="0.13"/>
    </pattern>
    <marker id="ar" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto">
      <path d="M 0 0 L 11 7 L 0 14 z" fill="#0E0A12"/>
    </marker>
  </defs>

  <rect width="1280" height="760" fill="#F5F2E5"/>
  <rect x="0" y="0" width="1280" height="120" fill="url(#dots-bg)"/>

  <g transform="translate(40 60)">
    <text x="0" y="0" font-style="italic" font-weight="900" font-size="44" fill="#0E0A12"
          style="text-shadow: 5px 5px 0 #2EFF8C, 9px 9px 0 #7B2EFF;">YOUR JOURNEY.</text>
    <text x="0" y="28" font-family="ui-monospace, monospace" font-size="13" font-weight="700"
          letter-spacing="0.2em" fill="#7B2EFF">PHOTO IN · CAP OUT · ROLL OUT · ~60 SECONDS</text>
  </g>

  <!-- ─────────────────── 6 STEPS ─────────────────── -->
  <!-- Step 1 -->
  <g transform="translate(40 200)">
    <rect width="180" height="220" fill="#F5F2E5" stroke="#0E0A12" stroke-width="3" rx="6"/>
    <rect x="-6" y="-6" width="40" height="20" fill="#7B2EFF" stroke="#0E0A12" stroke-width="2" transform="rotate(-4 14 4)"/>
    <text x="14" y="8" text-anchor="middle" font-family="Anton, sans-serif" font-style="italic" font-weight="900"
          font-size="13" fill="#FFFFFF" transform="rotate(-4 14 4)">01</text>

    <!-- Phone -->
    <g transform="translate(60 30)">
      <rect width="60" height="100" fill="#0E0A12" stroke="#0E0A12" stroke-width="2" rx="6"/>
      <rect x="6" y="14" width="48" height="68" fill="#FF2EAB"/>
      <circle cx="30" cy="48" r="14" fill="#FFD400" stroke="#F5F2E5" stroke-width="2"/>
      <circle cx="26" cy="46" r="2" fill="#0E0A12"/>
      <circle cx="34" cy="46" r="2" fill="#0E0A12"/>
      <path d="M 26 54 Q 30 58 34 54" stroke="#0E0A12" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>

    <text x="90" y="160" text-anchor="middle" font-style="italic" font-weight="900" font-size="16" fill="#0E0A12">Drop a photo.</text>
    <text x="90" y="180" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#3D2F4A">Front-facing portrait</text>
    <text x="90" y="194" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#3D2F4A">JPG · PNG · HEIC</text>
    <text x="90" y="208" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" font-weight="700" fill="#7B2EFF">~5 seconds</text>
  </g>

  <line x1="220" y1="310" x2="240" y2="310" stroke="#0E0A12" stroke-width="3" marker-end="url(#ar)"/>

  <!-- Step 2 -->
  <g transform="translate(240 200)">
    <rect width="180" height="220" fill="#F5F2E5" stroke="#0E0A12" stroke-width="3" rx="6"/>
    <rect x="-6" y="-6" width="40" height="20" fill="#FF2EAB" stroke="#0E0A12" stroke-width="2" transform="rotate(-4 14 4)"/>
    <text x="14" y="8" text-anchor="middle" font-family="Anton, sans-serif" font-style="italic" font-weight="900"
          font-size="13" fill="#FFFFFF" transform="rotate(-4 14 4)">02</text>

    <!-- TRELLIS box -->
    <g transform="translate(40 30)">
      <rect width="100" height="100" fill="#FFD400" stroke="#0E0A12" stroke-width="3" rx="4"/>
      <rect x="6" y="10" width="88" height="20" fill="#0E0A12"/>
      <text x="50" y="24" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" font-weight="700" fill="#2EFF8C" letter-spacing="0.1em">TRELLIS</text>
      <circle cx="30" cy="55" r="6" fill="#0E0A12"/>
      <circle cx="30" cy="55" r="2" fill="#FFD400"/>
      <circle cx="50" cy="65" r="9" fill="#FF2EAB" stroke="#0E0A12" stroke-width="2"/>
      <circle cx="70" cy="55" r="6" fill="#0E0A12"/>
      <circle cx="70" cy="55" r="2" fill="#FFD400"/>
    </g>

    <text x="90" y="160" text-anchor="middle" font-style="italic" font-weight="900" font-size="16" fill="#0E0A12">GPU sculpts.</text>
    <text x="90" y="180" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#3D2F4A">Microsoft TRELLIS</text>
    <text x="90" y="194" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#3D2F4A">on a private GPU</text>
    <text x="90" y="208" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" font-weight="700" fill="#7B2EFF">~30 seconds</text>
  </g>

  <line x1="420" y1="310" x2="440" y2="310" stroke="#0E0A12" stroke-width="3" marker-end="url(#ar)"/>

  <!-- Step 3 -->
  <g transform="translate(440 200)">
    <rect width="180" height="220" fill="#F5F2E5" stroke="#0E0A12" stroke-width="3" rx="6"/>
    <rect x="-6" y="-6" width="40" height="20" fill="#2EFF8C" stroke="#0E0A12" stroke-width="2" transform="rotate(-4 14 4)"/>
    <text x="14" y="8" text-anchor="middle" font-family="Anton, sans-serif" font-style="italic" font-weight="900"
          font-size="13" fill="#0E0A12" transform="rotate(-4 14 4)">03</text>

    <!-- Cap -->
    <g transform="translate(50 38)">
      <ellipse cx="40" cy="60" rx="36" ry="14" fill="#7B2EFF" stroke="#0E0A12" stroke-width="2"/>
      <ellipse cx="40" cy="40" rx="32" ry="40" fill="#7B2EFF" stroke="#0E0A12" stroke-width="2"/>
      <ellipse cx="40" cy="20" rx="20" ry="10" fill="#5A1FCE" stroke="#0E0A12" stroke-width="2"/>
      <rect x="22" y="76" width="36" height="10" fill="#0E0A12"/>
      <rect x="20" y="86" width="40" height="2" fill="#2EFF8C"/>
    </g>

    <text x="90" y="160" text-anchor="middle" font-style="italic" font-weight="900" font-size="16" fill="#0E0A12">CAD grafts.</text>
    <text x="90" y="180" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#3D2F4A">8-stage pipeline</text>
    <text x="90" y="194" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#3D2F4A">onto a Schrader thread</text>
    <text x="90" y="208" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" font-weight="700" fill="#7B2EFF">~10 seconds</text>
  </g>

  <line x1="620" y1="310" x2="640" y2="310" stroke="#0E0A12" stroke-width="3" marker-end="url(#ar)"/>

  <!-- Step 4 -->
  <g transform="translate(640 200)">
    <rect width="180" height="220" fill="#F5F2E5" stroke="#0E0A12" stroke-width="3" rx="6"/>
    <rect x="-6" y="-6" width="40" height="20" fill="#7B2EFF" stroke="#0E0A12" stroke-width="2" transform="rotate(-4 14 4)"/>
    <text x="14" y="8" text-anchor="middle" font-family="Anton, sans-serif" font-style="italic" font-weight="900"
          font-size="13" fill="#FFFFFF" transform="rotate(-4 14 4)">04</text>

    <!-- 3D viewer -->
    <g transform="translate(20 30)">
      <rect width="140" height="100" fill="#0E0A12" stroke="#0E0A12" stroke-width="2" rx="4"/>
      <ellipse cx="70" cy="55" rx="32" ry="38" fill="#7B2EFF" stroke="#2EFF8C" stroke-width="2"/>
      <ellipse cx="70" cy="40" rx="22" ry="8" fill="#A267FF"/>
      <circle cx="62" cy="48" r="2" fill="#0E0A12"/>
      <circle cx="78" cy="48" r="2" fill="#0E0A12"/>
      <text x="70" y="92" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#2EFF8C">drag to spin ↻</text>
    </g>

    <text x="90" y="160" text-anchor="middle" font-style="italic" font-weight="900" font-size="16" fill="#0E0A12">Preview + tweak.</text>
    <text x="90" y="180" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#3D2F4A">Tilt · pitch · crop</text>
    <text x="90" y="194" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#3D2F4A">re-render in seconds</text>
    <text x="90" y="208" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" font-weight="700" fill="#7B2EFF">live · cached</text>
  </g>

  <line x1="820" y1="310" x2="840" y2="310" stroke="#0E0A12" stroke-width="3" marker-end="url(#ar)"/>

  <!-- Step 5 -->
  <g transform="translate(840 200)">
    <rect width="180" height="220" fill="#F5F2E5" stroke="#0E0A12" stroke-width="3" rx="6"/>
    <rect x="-6" y="-6" width="40" height="20" fill="#FF2EAB" stroke="#0E0A12" stroke-width="2" transform="rotate(-4 14 4)"/>
    <text x="14" y="8" text-anchor="middle" font-family="Anton, sans-serif" font-style="italic" font-weight="900"
          font-size="13" fill="#FFFFFF" transform="rotate(-4 14 4)">05</text>

    <!-- 3D printer -->
    <g transform="translate(20 30)">
      <rect width="140" height="100" fill="#F5F2E5" stroke="#0E0A12" stroke-width="2"/>
      <rect x="6" y="6" width="6" height="74" fill="#0E0A12"/>
      <rect x="128" y="6" width="6" height="74" fill="#0E0A12"/>
      <rect x="6" y="6" width="128" height="6" fill="#0E0A12"/>
      <rect x="60" y="22" width="20" height="14" fill="#FFD400" stroke="#0E0A12" stroke-width="2"/>
      <rect x="50" y="80" width="40" height="6" fill="#7B2EFF"/>
      <ellipse cx="70" cy="80" rx="14" ry="6" fill="#2EFF8C" stroke="#0E0A12" stroke-width="2"/>
      <text x="70" y="100" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#0E0A12">FDM · PLA</text>
    </g>

    <text x="90" y="160" text-anchor="middle" font-style="italic" font-weight="900" font-size="16" fill="#0E0A12">Print at home.</text>
    <text x="90" y="180" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#3D2F4A">0.4 mm nozzle · PLA</text>
    <text x="90" y="194" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#3D2F4A">Bambu A1 · Prusa MK4</text>
    <text x="90" y="208" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" font-weight="700" fill="#7B2EFF">~60 min · ~$0.10</text>
  </g>

  <line x1="1020" y1="310" x2="1040" y2="310" stroke="#0E0A12" stroke-width="3" marker-end="url(#ar)"/>

  <!-- Step 6 -->
  <g transform="translate(1040 200)">
    <rect width="200" height="220" fill="#2EFF8C" stroke="#0E0A12" stroke-width="3" rx="6"/>
    <rect x="-6" y="-6" width="40" height="20" fill="#0E0A12" stroke="#0E0A12" stroke-width="2" transform="rotate(-4 14 4)"/>
    <text x="14" y="8" text-anchor="middle" font-family="Anton, sans-serif" font-style="italic" font-weight="900"
          font-size="13" fill="#2EFF8C" transform="rotate(-4 14 4)">06</text>

    <!-- Bike wheel -->
    <g transform="translate(50 30)">
      <circle cx="50" cy="50" r="48" fill="none" stroke="#0E0A12" stroke-width="3"/>
      <circle cx="50" cy="50" r="8" fill="#0E0A12"/>
      <line x1="50" y1="2" x2="50" y2="98" stroke="#0E0A12" stroke-width="1.5"/>
      <line x1="2" y1="50" x2="98" y2="50" stroke="#0E0A12" stroke-width="1.5"/>
      <line x1="14" y1="14" x2="86" y2="86" stroke="#0E0A12" stroke-width="1.5"/>
      <line x1="86" y1="14" x2="14" y2="86" stroke="#0E0A12" stroke-width="1.5"/>
      <ellipse cx="50" cy="2" rx="6" ry="10" fill="#7B2EFF" stroke="#0E0A12" stroke-width="2"/>
    </g>

    <text x="100" y="160" text-anchor="middle" font-style="italic" font-weight="900" font-size="16" fill="#0E0A12">Roll out.</text>
    <text x="100" y="180" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#0E0A12">Screw on the valve</text>
    <text x="100" y="194" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#0E0A12">Standard Schrader fit</text>
    <text x="100" y="208" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" font-weight="700" fill="#0E0A12">~5 seconds</text>
  </g>

  <!-- Numbers strip -->
  <g transform="translate(40 470)">
    <rect width="1200" height="80" fill="#0E0A12" stroke="#0E0A12" stroke-width="3" rx="6"/>
    <text x="14" y="22" font-family="ui-monospace, monospace" font-size="11" font-weight="700"
          letter-spacing="0.18em" fill="#2EFF8C">BY THE NUMBERS</text>

    <text x="14" y="46" font-family="ui-monospace, monospace" font-size="14" font-weight="700" fill="#FFFFFF">~60 sec</text>
    <text x="14" y="62" font-family="ui-monospace, monospace" font-size="9" fill="#F5F2E5">photo → STL ready</text>

    <text x="180" y="46" font-family="ui-monospace, monospace" font-size="14" font-weight="700" fill="#FFFFFF">$0.10</text>
    <text x="180" y="62" font-family="ui-monospace, monospace" font-size="9" fill="#F5F2E5">PLA cost per cap</text>

    <text x="320" y="46" font-family="ui-monospace, monospace" font-size="14" font-weight="700" fill="#FFFFFF">~30 mm</text>
    <text x="320" y="62" font-family="ui-monospace, monospace" font-size="9" fill="#F5F2E5">cap height</text>

    <text x="460" y="46" font-family="ui-monospace, monospace" font-size="14" font-weight="700" fill="#FFFFFF">FDM · PLA</text>
    <text x="460" y="62" font-family="ui-monospace, monospace" font-size="9" fill="#F5F2E5">any 3D printer with 0.4mm nozzle</text>

    <text x="700" y="46" font-family="ui-monospace, monospace" font-size="14" font-weight="700" fill="#FFFFFF">Schrader 8mm × 32 TPI</text>
    <text x="700" y="62" font-family="ui-monospace, monospace" font-size="9" fill="#F5F2E5">standard bike + car valve thread</text>

    <text x="940" y="46" font-family="ui-monospace, monospace" font-size="14" font-weight="700" fill="#2EFF8C">FREE during launch</text>
    <text x="940" y="62" font-family="ui-monospace, monospace" font-size="9" fill="#F5F2E5">code SADYSBIKES after</text>
  </g>

  <!-- CTA -->
  <g transform="translate(40 600)">
    <rect width="1200" height="120" fill="#F5F2E5" stroke="#0E0A12" stroke-width="3" rx="6"/>
    <text x="600" y="40" text-anchor="middle" font-style="italic" font-weight="900" font-size="32" fill="#0E0A12">Drop in a portrait. Roll out the same day.</text>
    <text x="600" y="68" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" font-weight="700" letter-spacing="0.12em" fill="#7B2EFF">STEMDOMEZ.COM/STEMDOME-GENERATOR</text>
    <text x="600" y="92" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#3D2F4A">No login required to preview. Sign in to download free.</text>
    <text x="600" y="108" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#3D2F4A" font-style="italic">Made for the Gumball Machine Takeover residency at Sadie's Bikes · Great Falls MA</text>
  </g>
</svg>
