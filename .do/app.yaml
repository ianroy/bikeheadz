# Digital Ocean App Platform spec for BikeHeadz.
# Docs: https://docs.digitalocean.com/products/app-platform/reference/app-spec/
#
# Architecture:
#   • Single Node.js web service serves the built Vite client AND the socket.io
#     endpoint on the same port. WebSockets are first-class on DO App Platform.
#   • Managed PostgreSQL 18 cluster attached as a component; its connection
#     string is injected as DATABASE_URL.
#   • All config comes from environment variables (12-factor §3).
#   • stdout/stderr are captured by the platform as the log stream (§11).

name: bikeheadz
region: nyc

features:
  - buildpack-stack=ubuntu-22

services:
  - name: web
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 8080
    source_dir: /
    github:
      branch: main
      deploy_on_push: true
      # repo: your-org/bikeheadz    # fill in when wiring to GitHub
    build_command: npm ci && npm run build
    run_command: node server/index.js
    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 15
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        scope: RUN_AND_BUILD_TIME
        value: production
      - key: LOG_LEVEL
        scope: RUN_TIME
        value: info
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: DATABASE_SSL
        scope: RUN_TIME
        value: "true"

  # One-off migration job. Runs before every deployment goes live.
  - name: migrate
    kind: PRE_DEPLOY
    environment_slug: node-js
    source_dir: /
    build_command: npm ci
    run_command: node server/migrate.js
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: DATABASE_SSL
        scope: RUN_TIME
        value: "true"

databases:
  - name: db
    engine: PG
    version: "18"
    production: true
