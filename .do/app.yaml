# Digital Ocean App Platform spec for BikeHeadz.
# Docs: https://docs.digitalocean.com/products/app-platform/reference/app-spec/
#
# Architecture:
#   • Single Node.js web service serves the built Vite client AND the socket.io
#     endpoint on the same port. WebSockets are first-class on DO App Platform.
#   • Managed PostgreSQL 18 cluster attached as a component; its connection
#     string is injected as DATABASE_URL.
#   • Stripe secret keys are bound as SECRET env vars (never checked in).
#   • TRELLIS (image → 3D) runs on a GPU machine. DO App Platform does not
#     currently include GPU instance sizes, so in production TRELLIS should
#     run on a GPU Droplet reachable from the app; set TRELLIS_ENABLED=false
#     here and have the STL worker defer generation to that service, or
#     deploy this app onto a GPU-capable runtime of your choice.
#   • All config comes from environment variables (12-factor §3).
#   • stdout/stderr are captured by the platform as the log stream (§11).

name: bikeheadz
region: nyc

features:
  - buildpack-stack=ubuntu-22

services:
  - name: web
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 8080
    source_dir: /
    github:
      branch: main
      deploy_on_push: true
      # repo: your-org/bikeheadz    # fill in when wiring to GitHub
    build_command: npm install && npm run build
    run_command: node server/index.js
    health_check:
      http_path: /health
      initial_delay_seconds: 10
      period_seconds: 15
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        scope: RUN_AND_BUILD_TIME
        value: production
      - key: LOG_LEVEL
        scope: RUN_TIME
        value: info
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: DATABASE_SSL
        scope: RUN_TIME
        value: "true"
      # APP_URL is derived from the socket origin at request time (see
      # server/stripe-client.js appUrl). Set it here as an App-Level env
      # var only if you want to pin Stripe redirects to a specific domain
      # regardless of where the browser loaded the app.
      # ── Stripe ─────────────────────────────────────────────────────
      # Bind STRIPE_SECRET_KEY as a SECRET in the DO dashboard before the
      # first deploy (Settings → App-Level Environment Variables).
      - key: STRIPE_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
        value: ""
      - key: STRIPE_CURRENCY
        scope: RUN_TIME
        value: "usd"
      - key: STRIPE_PRICE_STL_CENTS
        scope: RUN_TIME
        value: "200"
      # ── TRELLIS (local fallback; used only if RUNPOD_* is unset) ───
      # App Platform has no GPU sizes, so keep this disabled in prod.
      # Real inference runs on the RunPod endpoint below.
      - key: TRELLIS_ENABLED
        scope: RUN_TIME
        value: "false"
      - key: TRELLIS_MODEL
        scope: RUN_TIME
        value: "microsoft/TRELLIS-image-large"
      - key: PYTHON_BIN
        scope: RUN_TIME
        value: "python3"
      # ── RunPod (GPU TRELLIS backend) ───────────────────────────────
      # When both values are set, stl.generate is routed to RunPod
      # Serverless. See deploy/runpod/README.md for setup.
      - key: RUNPOD_ENDPOINT_URL
        scope: RUN_TIME
        value: ""
      - key: RUNPOD_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: ""
      # ── Auth (P1-001 / P1-002 / P0-008) ────────────────────────────
      - key: AUTH_SECRET
        scope: RUN_TIME
        type: SECRET
        value: ""
      - key: ADMIN_EMAILS
        scope: RUN_TIME
        value: ""
      # ── Email (Resend or Postmark; both keys safe to leave blank) ──
      - key: EMAIL_FROM
        scope: RUN_TIME
        value: "BikeHeadz <noreply@bikeheadz.app>"
      - key: RESEND_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: ""
      - key: POSTMARK_TOKEN
        scope: RUN_TIME
        type: SECRET
        value: ""
      # ── Sentry (P0-005) ───────────────────────────────────────────
      - key: SENTRY_DSN
        scope: RUN_TIME
        type: SECRET
        value: ""
      - key: SENTRY_ENVIRONMENT
        scope: RUN_TIME
        value: "production"
      # ── /metrics token (P4-002) ───────────────────────────────────
      - key: METRICS_TOKEN
        scope: RUN_TIME
        type: SECRET
        value: ""
      # ── Stripe webhook + tax + shipping ───────────────────────────
      - key: STRIPE_WEBHOOK_ENABLED
        scope: RUN_TIME
        value: "true"
      - key: STRIPE_WEBHOOK_SECRET
        scope: RUN_TIME
        type: SECRET
        value: ""
      - key: STRIPE_TAX_ENABLED
        scope: RUN_TIME
        value: "false"
      - key: STRIPE_SHIPPING_COUNTRIES
        scope: RUN_TIME
        value: "US,CA,GB,DE,FR,IE,NL,BE,IT,ES,DK,SE,NO,FI,AU,NZ"
      - key: STRIPE_PRICE_PRINT_CENTS
        scope: RUN_TIME
        value: "1999"
      - key: STRIPE_PRICE_PACK_CENTS
        scope: RUN_TIME
        value: "5999"
      - key: STRIPE_CUSTOMER_PORTAL_CONFIG_ID
        scope: RUN_TIME
        value: ""
      # ── Share-link signing (P5-002) ───────────────────────────────
      - key: SHARE_LINK_SECRET
        scope: RUN_TIME
        type: SECRET
        value: ""
      # ── Pipeline budgets (P0-017 / P0-018) ────────────────────────
      # Honoured by handler.py / server/workers/pipeline/__init__.py.
      - key: STAGE_TIMEOUT_S
        scope: RUN_TIME
        value: "60"
      - key: JOB_TIMEOUT_S
        scope: RUN_TIME
        value: "300"
      - key: MAX_TRIS_AFTER_REPAIR
        scope: RUN_TIME
        value: "500000"
      # ── Synthetic canary (P4-013) ─────────────────────────────────
      - key: CANARY_TIMEOUT_MS
        scope: RUN_TIME
        value: "300000"
      - key: CANARY_LATENCY_BUDGET_MS
        scope: RUN_TIME
        value: "90000"
      - key: CANARY_MIN_BYTES
        scope: RUN_TIME
        value: "200000"
      - key: CANARY_MAX_BYTES
        scope: RUN_TIME
        value: "10000000"

  # One-off migration job. Runs before every deployment goes live.
  - name: migrate
    kind: PRE_DEPLOY
    environment_slug: node-js
    source_dir: /
    build_command: npm install
    run_command: node server/migrate.js
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: DATABASE_SSL
        scope: RUN_TIME
        value: "true"

databases:
  - name: db
    engine: PG
    version: "18"
    production: true
